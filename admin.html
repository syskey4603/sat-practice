<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SAT Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#080812;color:#f1f5f9;min-height:100vh;}
.orb{position:fixed;border-radius:50%;filter:blur(100px);opacity:.1;pointer-events:none;z-index:0;}
.o1{width:400px;height:400px;background:#7c3aed;top:-150px;left:-100px;animation:d1 12s ease-in-out infinite;}
.o2{width:300px;height:300px;background:#2563eb;bottom:0;right:-100px;animation:d2 10s ease-in-out infinite;}
@keyframes d1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,20px)}}
@keyframes d2{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,-30px)}}
.wrap{max-width:820px;margin:0 auto;padding:2rem 1rem;position:relative;z-index:1;}
.page{animation:pi .25s ease forwards;}
@keyframes pi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:1.25rem;margin-bottom:.75rem;}
h1{font-size:22px;font-weight:600;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
h2{font-size:16px;font-weight:600;color:#e2e8f0;margin-bottom:.75rem;}
.muted{color:#64748b;font-size:13px;}
.fl{font-size:11px;font-weight:500;color:#64748b;letter-spacing:.05em;display:block;margin-bottom:5px;}
input,textarea{width:100%;padding:9px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:9px;font-size:13px;color:#f1f5f9;font-family:inherit;transition:border-color .2s;}
input:focus,textarea:focus{outline:none;border-color:rgba(124,58,237,.5);box-shadow:0 0 0 3px rgba(124,58,237,.1);}
textarea{font-family:monospace;font-size:12px;resize:vertical;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:none;transition:all .18s;}
.btn:active{transform:scale(.97);}
.btn-p{background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;box-shadow:0 0 16px rgba(124,58,237,.25);}
.btn-p:hover{box-shadow:0 0 24px rgba(124,58,237,.4);filter:brightness(1.08);}
.btn-g{background:rgba(255,255,255,.07);color:#e2e8f0;border:1px solid rgba(255,255,255,.1);}
.btn-g:hover{background:rgba(255,255,255,.11);}
.btn-r{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2);}
.btn-r:hover{background:rgba(239,68,68,.18);}
.btn-sm{padding:4px 11px;font-size:12px;border-radius:7px;}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;filter:none!important;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;}
.b-rw{background:rgba(139,92,246,.2);color:#c4b5fd;border:1px solid rgba(139,92,246,.3);}
.b-math{background:rgba(59,130,246,.2);color:#93c5fd;border:1px solid rgba(59,130,246,.3);}
.b-done{background:rgba(16,185,129,.15);color:#6ee7b7;border:1px solid rgba(16,185,129,.25);}
.b-miss{background:rgba(255,255,255,.05);color:#475569;border:1px solid rgba(255,255,255,.08);}
.err{font-size:13px;color:#fca5a5;padding:9px 13px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:9px;margin-bottom:.75rem;}
.ok{font-size:13px;color:#6ee7b7;padding:9px 13px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:9px;margin-bottom:.75rem;}
.ld{width:18px;height:18px;border:2px solid rgba(255,255,255,.1);border-top-color:#a78bfa;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
.pin-in{width:180px;font-size:22px;letter-spacing:.3em;text-align:center;padding:11px;}
.step{display:flex;align-items:flex-start;gap:10px;padding:.6rem 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;color:#94a3b8;}
.step:last-child{border-bottom:none;}
.step-num{width:22px;height:22px;min-width:22px;background:linear-gradient(135deg,#7c3aed,#2563eb);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.mod-slots{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.slot{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
.slot-done{background:rgba(16,185,129,.15);color:#6ee7b7;border:1px solid rgba(16,185,129,.25);}
.slot-miss{background:rgba(255,255,255,.04);color:#475569;border:1px solid rgba(255,255,255,.07);}
.test-row{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05);gap:.75rem;flex-wrap:wrap;}
.test-row:last-child{border-bottom:none;}
pre{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);padding:1rem;border-radius:10px;font-size:12px;overflow-x:auto;line-height:1.6;white-space:pre-wrap;color:#94a3b8;}
.preview-q{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;color:#94a3b8;}
.preview-q:last-child{border-bottom:none;}
</style>
</head>
<body>
<div class="o1 orb"></div><div class="o2 orb"></div>
<div class="wrap"><div id="app" class="page"></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const ADMIN_PIN='1234'; // change this
const SURL='https://cvvqhforzpdjjhxibkeg.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2dnFoZm9yenBkampoeGlia2VnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NTM5MjYsImV4cCI6MjA5NDUyOTkyNn0.rpbJ7SB1SDdjQRHMHYPNQ04BRJbvWFYWJn80IEhToPU';
const {createClient}=supabase;const db=createClient(SURL,SKEY);
const MODS=['RW1','RW2','Math1','Math2'];
const ML={RW1:'R&W \u2014 Mod 1',RW2:'R&W \u2014 Mod 2',Math1:'Math \u2014 Mod 1',Math2:'Math \u2014 Mod 2'};
const S={unlocked:sessionStorage.getItem('ap')==='1',pin:'',pinErr:'',tests:[],loading:false,jt:'',parsed:null,perr:'',saving:false,msg:'',err:''};

function r(){document.getElementById('app').innerHTML=S.unlocked?home():pin();bind();}

function pin(){return`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem">
  <h1 style="font-size:28px">SAT Admin</h1>
  <p class="muted">Enter PIN to continue</p>
  <input class="pin-in" type="password" id="pi" maxlength="8" placeholder="\u2022\u2022\u2022\u2022" autocomplete="off"/>
  ${S.pinErr?`<p style="color:#fca5a5;font-size:13px">${S.pinErr}</p>`:''}
  <button class="btn btn-p" id="pb" style="padding:10px 28px">Unlock</button>
</div>`;}

function home(){
  const prev=S.parsed?`<div style="margin-top:.75rem;padding:.75rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:.5rem;flex-wrap:wrap">
      <span style="font-weight:500;color:#e2e8f0">${S.parsed.test_name||'Unnamed'}</span>
      <span class="badge ${S.parsed.module_type?.startsWith('R')?'b-rw':'b-math'}">${ML[S.parsed.module_type]||S.parsed.module_type}</span>
      <span style="font-size:12px;color:#64748b">${S.parsed.questions?.length||0} questions</span>
    </div>
    ${(S.parsed.questions||[]).slice(0,3).map((q,i)=>`<div class="preview-q"><strong style="color:#e2e8f0">Q${q.number||i+1}.</strong> ${(q.question||'').substring(0,90)}&hellip;<br><span style="color:#6ee7b7;font-size:12px">\u2713 ${q.answer}</span></div>`).join('')}
  </div>`:S.perr?`<div class="err" style="margin-top:.5rem">${S.perr}</div>`:'';

  const tlist=S.loading?`<div style="display:flex;align-items:center;gap:8px;padding:1rem 0"><div class="ld"></div><span class="muted">Loading...</span></div>`
    :S.tests.length?S.tests.map(t=>`<div class="test-row">
      <div style="flex:1;min-width:0">
        <div style="font-weight:500;color:#e2e8f0;margin-bottom:4px">${t.name}</div>
        ${t.date?`<div class="muted" style="margin-bottom:6px">${t.date}</div>`:''}
        <div class="mod-slots">
          ${MODS.map(m=>`<span class="slot ${t.mods[m]?'slot-done':'slot-miss'}">${m}${t.mods[m]?' \u2713':''}</span>`).join('')}
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <span style="font-size:12px;color:#475569">${t.mc}/4</span>
        <button class="btn btn-r btn-sm" data-del="${t.id}">\u00d7</button>
      </div>
    </div>`).join(''):`<p class="muted" style="padding:1rem 0">No tests yet.</p>`;

  return`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
    <h1>SAT Admin</h1>
    <button class="btn btn-r btn-sm" id="lkbtn">\ud83d\udd12 Lock</button>
  </div>
  ${S.msg?`<div class="ok">${S.msg}</div>`:''}
  ${S.err?`<div class="err">${S.err}</div>`:''}
  <div class="card">
    <h2>Add module</h2>
    <div style="background:rgba(0,0,0,.2);border-radius:10px;padding:.75rem;margin-bottom:1rem;">
      <div class="step"><div class="step-num">1</div><div>Send a PDF module to any AI with the prompt below and get JSON back</div></div>
      <div class="step"><div class="step-num">2</div><div>Paste the JSON here — use the <strong>same test_name</strong> for all 4 modules of a test</div></div>
      <div class="step"><div class="step-num">3</div><div>Click Save — the module is instantly live for all users</div></div>
    </div>
    <details style="margin-bottom:.75rem">
      <summary style="font-size:13px;cursor:pointer;color:#94a3b8;font-weight:500;padding:.4rem 0">Show extraction prompt \u25be</summary>
      <pre style="margin-top:.5rem">Extract all SAT questions from this PDF. Return ONLY a valid JSON object \u2014 no markdown, no explanation.

{
  "test_name": "name from watermark e.g. 'May 2025 INT Test C'",
  "test_date": "YYYY-MM-DD or null",
  "source": "publisher from watermark e.g. 'CookingSAT'",
  "module_type": "RW1 / RW2 / Math1 / Math2",
  "questions": [
    {
      "number": 1,
      "passage": "full passage text or empty string",
      "question": "the question text",
      "options": {"A":"...","B":"...","C":"...","D":"..."},
      "answer": "correct letter A/B/C/D",
      "explanation": "one sentence why this is correct"
    }
  ]
}

Module type:
  Section 1 Module 1 Reading and Writing \u2192 RW1
  Section 1 Module 2 Reading and Writing \u2192 RW2
  Section 2 Module 1 Math                \u2192 Math1
  Section 2 Module 2 Math                \u2192 Math2</pre>
    </details>
    <span class="fl">PASTE JSON</span>
    <textarea id="ji" rows="8" placeholder='{"test_name":"...","module_type":"RW1","questions":[...]}'>${S.jt}</textarea>
    ${prev}
    <div style="display:flex;gap:8px;margin-top:.75rem">
      <button class="btn btn-p" id="savebtn" ${(!S.parsed||S.saving)?'disabled':''}>${S.saving?'<span class="ld"></span>&nbsp;Saving...':'Save module'}</button>
      <button class="btn btn-g btn-sm" id="clrbtn">Clear</button>
    </div>
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
      <h2 style="margin:0">All tests (${S.tests.length})</h2>
      <button class="btn btn-g btn-sm" id="rfbtn">Refresh</button>
    </div>
    ${tlist}
  </div>`;}

function parseJ(){
  if(!S.jt.trim()){S.parsed=null;S.perr='';return;}
  try{const d=JSON.parse(S.jt);
    if(!d.test_name) throw new Error('Missing "test_name"');
    if(!d.module_type||!MODS.includes(d.module_type)) throw new Error('"module_type" must be RW1, RW2, Math1, or Math2');
    if(!Array.isArray(d.questions)||!d.questions.length) throw new Error('"questions" array empty or missing');
    S.parsed=d;S.perr='';
  }catch(e){S.parsed=null;S.perr='JSON error: '+e.message;}
}

async function save(){
  if(!S.parsed||S.saving) return;
  S.saving=true;S.msg='';S.err='';r();
  try{
    const d=S.parsed;let tid=null;
    const ex=S.tests.find(t=>t.name.toLowerCase()===d.test_name.toLowerCase());
    if(ex){tid=ex.id;}
    else{const{data,error}=await db.from('tests').insert({name:d.test_name,date:d.test_date||null,source:d.source||'Unknown'}).select().single();if(error)throw error;tid=data.id;}
    const{error:me}=await db.from('modules').upsert({test_id:tid,module_type:d.module_type,questions:d.questions,uploaded_at:new Date().toISOString()},{onConflict:'test_id,module_type'});
    if(me)throw me;
    S.msg=`\u2713 ${d.questions.length} questions saved \u2014 ${d.test_name} (${ML[d.module_type]||d.module_type})`;
    S.jt='';S.parsed=null;await loadTests();
  }catch(e){S.err='Error: '+(e.message||JSON.stringify(e));}
  S.saving=false;r();
}

async function loadTests(){
  S.loading=true;r();
  const{data}=await db.from('tests').select('id,name,date,source,modules(id,module_type)').order('date',{ascending:false});
  S.tests=(data||[]).map(t=>({...t,mc:(t.modules||[]).length,mods:Object.fromEntries((t.modules||[]).map(m=>[m.module_type,m]))}));
  S.loading=false;
}

function bind(){
  const on=(id,fn)=>{const e=document.getElementById(id);if(e)e.onclick=fn;};
  const pi=document.getElementById('pi');
  if(pi){pi.oninput=e=>S.pin=e.target.value;pi.onkeydown=e=>{if(e.key==='Enter')chkPin();};pi.focus();}
  on('pb',chkPin);
  on('lkbtn',()=>{sessionStorage.removeItem('ap');S.unlocked=false;S.pin='';r();});
  on('rfbtn',async()=>{await loadTests();r();});
  on('clrbtn',()=>{S.jt='';S.parsed=null;S.perr='';r();});
  on('savebtn',save);
  const ji=document.getElementById('ji');if(ji)ji.oninput=e=>{S.jt=e.target.value;parseJ();r();};
  document.querySelectorAll('[data-del]').forEach(el=>el.onclick=async()=>{
    if(!confirm('Delete this entire test and all its modules?'))return;
    await db.from('tests').delete().eq('id',el.dataset.del);
    await loadTests();S.msg='Deleted.';r();
  });
}

function chkPin(){
  if(S.pin===ADMIN_PIN){sessionStorage.setItem('ap','1');S.unlocked=true;S.pinErr='';loadTests().then(r);}
  else{S.pinErr='Wrong PIN.';r();}
}
r();
</script></body></html>
